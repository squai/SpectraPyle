instrument:
  instrument_name: euclid
  survey_name: wide
  grism_type: red
  data_release: DR1
instrument_constants:
  wavelengths_blue:
  - 9260.0
  - 13660.0
  wavelengths_red:
  - 11900.0
  - 19002.0
  R: 600
  reference_lambda: 16000
  units: erg/s/cm2/A
  units_scale_factor: 1.0e-16
io:
  spectra_mode: metadata path
  input_dir: prova
  filename_in: prova
  filename_in_extention: csv
  output_dir: prova
  spectra_datafile: metadata
  filename_out: AUTO
cosmology:
  cosmo_H0: 70.0
  cosmo_Om0: 0.3
redshift:
  z_type: rest_frame
norm:
  spectra_normalization: no_normalization
  conservation: luminosity
catalog_columns:
  ID_column_name: object_id
  redshift_column_name: z_spe
  metadata:
    metadata_path_column_name: ciao
    metadata_file_column_name: ciao
    metadata_indx_column_name: ciao
  galactic_extinction_parameters:
    galactic_extinction: true
    gal_ext_column_name: gal_ebv
  custom_normalization:
    custom_column_name: Ha
resampling:
  pixel_resampling_type: lambda
  pixel_size_type: instrumental
  nyquist_sampling: 5.0
bootstrap:
  bootstrapping_R: 300
sigmaclip:
  sigma_clipping_conditions: 3.0
parallel:
  multiprocessing: true
  max_cpu_fraction: 0.9
plot:
  plot_results: true
config_version: 1.0.0
