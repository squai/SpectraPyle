instrument:
  instrument_name: euclid
  survey_name: wide
  grism_type: red
  data_release: Q1
  quality:
    pixel_mask:
    - 0
    n_min_dithers: 3
instrument_constants:
  wavelengths_blue:
  - 9260.0
  - 13660.0
  wavelengths_red:
  - 11900.0
  - 19002.0
  R: 600
  reference_lambda: 16000
  units: erg/s/cm2/A
  units_scale_factor: 1.0e-16
io:
  spectra_mode: metadata path
  input_dir: ../tests/DATALABS_METAFILES
  filename_in: metadata_test
  filename_in_extention: csv
  output_dir: ../tests/DATALABS_METAFILES/output_test
  spectra_datafile: metadata
  filename_out: AUTO
cosmology:
  cosmo_H0: 70.0
  cosmo_Om0: 0.3
redshift:
  z_type: rest_frame
norm:
  spectra_normalization: median
catalog_columns:
  ID_column_name: source_id
  redshift_column_name: spe_z
  metadata:
    metadata_path_column_name: datalabs_path
    metadata_file_column_name: file_name
    metadata_indx_column_name: hdu_index
  galactic_extinction_parameters:
    galactic_extinction: true
    gal_ext_column_name: gal_ebv
resampling:
  pixel_resampling_type: lambda
  pixel_size_type: manual
  pixel_resampling: 4.0
bootstrap:
  bootstrapping_R: 300
sigmaclip:
  sigma_clipping_conditions: 3.0
parallel:
  multiprocessing: true
  max_cpu_fraction: 0.9
plot:
  plot_results: true
config_version: 1.0.0
