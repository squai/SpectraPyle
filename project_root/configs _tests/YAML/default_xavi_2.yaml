instrument:
  instrument_name: euclid
  survey_name: wide
  grism_type: red
  data_release: Q1
  quality:
    pixel_mask:
    - 0
    n_min_dithers: 3
instrument_constants:
  wavelengths_blue:
  - 9260.0
  - 13660.0
  wavelengths_red:
  - 11900.0
  - 19002.0
  R: 600
  reference_lambda: 16000
  units: erg/s/cm2/A
  units_scale_factor: 1.0e-16
io:
  spectra_mode: combined fits
  input_dir: /media/team_workspaces/Euclid-spectrum-stacking/STACKSPEC_stable_version/v5.0/project_root/tests/ALL_IN_ONE_FITS
  filename_in: df_AGN_desi_rgs
  filename_in_extention: fits
  output_dir: /media/team_workspaces/Euclid-spectrum-stacking/STACKSPEC_stable_version/v5.0/project_root/tests/ALL_IN_ONE_FITS/ciao
  spectra_dir: /media/team_workspaces/Euclid-spectrum-stacking/STACKSPEC_stable_version/v5.0/project_root/tests/ALL_IN_ONE_FITS
  spectra_datafile: TypeII_Xavi_cand_RGS_deep
  filename_out: AUTO
cosmology:
  cosmo_H0: 70.0
  cosmo_Om0: 0.3
redshift:
  z_type: rest_frame
norm:
  spectra_normalization: interval
  lambda_norm_min: 11100.0
  lambda_norm_max: 12000.0
  interval_norm_statistics: median
catalog_columns:
  ID_column_name: OBJ_ID
  redshift_column_name: Z
  galactic_extinction_parameters:
    galactic_extinction: false
resampling:
  pixel_resampling_type: lambda
  pixel_size_type: manual
  pixel_resampling: 4.0
bootstrap:
  bootstrapping_R: 300
sigmaclip:
  sigma_clipping_conditions: 3.0
parallel:
  multiprocessing: true
  max_cpu_fraction: 0.9
plot:
  plot_results: true
config_version: 1.0.0
